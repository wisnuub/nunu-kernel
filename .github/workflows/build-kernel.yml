name: Build Kernel (KernelSU + SUSFS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Android kernel branch'
        required: false
        default: 'android16-6.12'

env:
  KERNEL_BRANCH: ${{ github.event.inputs.kernel_branch || 'android16-6.12' }}
  ARCH: arm64

jobs:
  build:
    name: Build android16-6.12 + KernelSU + SUSFS
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout nunu-kernel
        uses: actions/checkout@v4

      # ── 2. Install dependencies + LLVM/Clang (native x86_64) ────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev libelf-dev libncurses-dev \
            python3 python3-pip git curl unzip rsync \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            cpio kmod make

          # Install LLVM 18 (native x86_64 — required for LLVM=1 kernel builds)
          curl -fsSL https://apt.llvm.org/llvm.sh | sudo bash -s 18
          sudo apt-get install -y --no-install-recommends \
            clang-18 lld-18 llvm-18 clang-tools-18

          # Symlink so the kernel Makefile finds them as 'clang', 'ld.lld', etc.
          sudo update-alternatives --install /usr/bin/clang   clang   /usr/bin/clang-18   100
          sudo update-alternatives --install /usr/bin/lld     lld     /usr/bin/lld-18     100
          sudo update-alternatives --install /usr/bin/ld.lld  ld.lld  /usr/bin/ld.lld-18  100
          sudo update-alternatives --install /usr/bin/llvm-ar llvm-ar /usr/bin/llvm-ar-18 100
          sudo update-alternatives --install /usr/bin/llvm-nm llvm-nm /usr/bin/llvm-nm-18 100
          sudo update-alternatives --install /usr/bin/llvm-objcopy llvm-objcopy /usr/bin/llvm-objcopy-18 100
          sudo update-alternatives --install /usr/bin/llvm-objdump llvm-objdump /usr/bin/llvm-objdump-18 100
          sudo update-alternatives --install /usr/bin/llvm-strip   llvm-strip   /usr/bin/llvm-strip-18   100

          echo "Clang version: $(clang --version | head -1)"
          echo "ld.lld version: $(ld.lld --version | head -1)"

      # ── 3. Cache kernel source ───────────────────────────────────────────────
      - name: Cache kernel source
        uses: actions/cache@v4
        id: cache-kernel
        with:
          path: kernel/common
          key: kernel-${{ env.KERNEL_BRANCH }}-${{ hashFiles('kernel/.kernel-rev') }}
          restore-keys: kernel-${{ env.KERNEL_BRANCH }}-

      # ── 4. Clone kernel source (shallow) ────────────────────────────────────
      - name: Clone kernel/common
        if: steps.cache-kernel.outputs.cache-hit != 'true'
        run: |
          git clone \
            --depth=1 \
            --branch ${{ env.KERNEL_BRANCH }} \
            https://android.googlesource.com/kernel/common \
            kernel/common
          git -C kernel/common rev-parse HEAD > kernel/.kernel-rev

      # ── 5. Apply KernelSU ────────────────────────────────────────────────────
      - name: Apply KernelSU
        working-directory: kernel/common
        run: |
          echo "Applying KernelSU via official setup script…"
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          echo "KernelSU applied."
          ls drivers/kernelsu/ 2>/dev/null || true

      # ── 6. Apply SUSFS patches ───────────────────────────────────────────────
      - name: Apply SUSFS
        working-directory: kernel/common
        run: |
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs4ksu

          PATCH_DIR="/tmp/susfs4ksu/kernel_patches"
          KERNEL_VER="6.12"

          if ls "$PATCH_DIR/$KERNEL_VER/"*.patch &>/dev/null 2>&1; then
            echo "Applying SUSFS patches for kernel $KERNEL_VER"
            for p in "$PATCH_DIR/$KERNEL_VER/"*.patch; do
              echo "  Applying: $(basename $p)"
              patch -p1 < "$p" || { echo "WARN: retrying with --forward"; patch -p1 --forward < "$p" || true; }
            done
          else
            echo "No patches for $KERNEL_VER — available:"
            ls "$PATCH_DIR/" || true
            AVAIL=$(ls "$PATCH_DIR/" | grep -E '^[0-9]' | sort -V | tail -1)
            if [ -n "$AVAIL" ]; then
              echo "Falling back to patches for $AVAIL"
              for p in "$PATCH_DIR/$AVAIL/"*.patch; do
                patch -p1 < "$p" || true
              done
            fi
          fi

          # Copy SUSFS fs/include additions
          cp -r /tmp/susfs4ksu/kernel_patches/fs/*      fs/      2>/dev/null || true
          cp -r /tmp/susfs4ksu/kernel_patches/include/* include/ 2>/dev/null || true
          echo "SUSFS patches applied."

      # ── 7. Configure kernel ──────────────────────────────────────────────────
      - name: Configure kernel
        working-directory: kernel/common
        run: |
          # Pick base config: prefer Cuttlefish virtual device, then GKI
          if [ -f "arch/arm64/configs/virtual_device_aarch64_defconfig" ]; then
            BASE_CONFIG="virtual_device_aarch64_defconfig"
          elif [ -f "arch/arm64/configs/gki_defconfig" ]; then
            BASE_CONFIG="gki_defconfig"
          else
            BASE_CONFIG="defconfig"
          fi
          echo "Using base config: $BASE_CONFIG"

          make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=ld.lld $BASE_CONFIG

          # KernelSU
          scripts/config --enable CONFIG_KSU
          scripts/config --enable CONFIG_KSU_DEBUG || true

          # SUSFS
          scripts/config --enable CONFIG_KSU_SUSFS           || true
          scripts/config --enable CONFIG_KSU_SUSFS_SUS_PATH  || true
          scripts/config --enable CONFIG_KSU_SUSFS_SUS_MOUNT || true
          scripts/config --enable CONFIG_KSU_SUSFS_SUS_KSTAT || true
          scripts/config --enable CONFIG_KSU_SUSFS_SUS_OVERLAYFS || true
          scripts/config --enable CONFIG_KSU_SUSFS_TRY_UMOUNT     || true
          scripts/config --enable CONFIG_KSU_SUSFS_SPOOF_UNAME    || true
          scripts/config --enable CONFIG_KSU_SUSFS_ENABLE_LOG     || true
          scripts/config --enable CONFIG_KSU_SUSFS_OPEN_REDIRECT  || true

          # Modules + probes
          scripts/config --enable CONFIG_MODULES
          scripts/config --enable CONFIG_MODULE_UNLOAD
          scripts/config --enable CONFIG_KPROBES

          # Cuttlefish / VirtIO
          scripts/config --enable CONFIG_VIRTIO
          scripts/config --enable CONFIG_VIRTIO_NET
          scripts/config --enable CONFIG_VIRTIO_BLK
          scripts/config --enable CONFIG_VIRTIO_CONSOLE
          scripts/config --enable CONFIG_DRM_VIRTIO_GPU
          scripts/config --enable CONFIG_VIRTIO_INPUT

          # Accept new symbols with defaults
          yes "" | make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=ld.lld olddefconfig

      # ── 8. Build kernel ──────────────────────────────────────────────────────
      - name: Build kernel
        working-directory: kernel/common
        run: |
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang LD=ld.lld \
            -j$(nproc) \
            Image Image.gz 2>&1 | tee ../build.log
          ls -lh arch/arm64/boot/Image* 2>/dev/null

      # ── 9. Package artifacts ─────────────────────────────────────────────────
      - name: Package artifacts
        run: |
          mkdir -p out
          cp kernel/common/arch/arm64/boot/Image    out/vmlinuz_full
          cp kernel/common/arch/arm64/boot/Image    out/Image
          cp kernel/common/arch/arm64/boot/Image.gz out/Image.gz 2>/dev/null || true

          KVER=$(cat kernel/common/include/config/kernel.release 2>/dev/null || echo "android16-6.12-ksu-susfs")
          echo "$KVER" > out/kernel-version.txt

          echo "Kernel: $KVER"                                                                    > out/build-info.txt
          echo "KernelSU: $(git -C kernel/common log --oneline -1 drivers/kernelsu/ 2>/dev/null || echo applied)" >> out/build-info.txt
          echo "SUSFS: applied"                                                                  >> out/build-info.txt
          echo "Built: $(date -u)"                                                               >> out/build-info.txt

          ls -lh out/

      # ── 10. Upload artifacts ─────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nunu-kernel-${{ env.KERNEL_BRANCH }}
          path: out/
          retention-days: 30

      # ── 11. Create GitHub Release (tag builds only) ──────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/vmlinuz_full
            out/Image.gz
            out/kernel-version.txt
            out/build-info.txt
          body: |
            ## nunu-kernel ${{ github.ref_name }}

            Custom Android 16 kernel for Cuttlefish (nunu) with:
            - **KernelSU** — root management
            - **SUSFS** — filesystem-level root hiding

            ### Usage
            In nunu Settings → Custom Kernel → Download Kernel.
            Or manually replace `~/.nunu/cuttlefish/vmlinuz_full`.

            ### Kernel info
            Branch: `${{ env.KERNEL_BRANCH }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
