# nunu-kernel runtime sysctl tuning
# Applied at boot via Android init.rc on top of kernel defaults.
# These mirror what sultan-kernel, Kirisakura, and Google's Pixel gaming mode apply.

# ── Memory ───────────────────────────────────────────────────────────────────

# Low swappiness — games need RAM to stay in memory, not get swapped.
# 10-20 is the gaming kernel standard (default is 100 on Android).
vm.swappiness=10

# Allow larger dirty cache before writeback kicks in.
# Reduces I/O stalls during game asset streaming.
vm.dirty_ratio=30
vm.dirty_background_ratio=10

# Disable periodic writeback wakeup — let it happen on pressure instead.
vm.dirty_writeback_centisecs=0
vm.dirty_expire_centisecs=200

# Prevent unevictable page compaction stalls during gameplay.
vm.compact_unevictable_allowed=0

# Higher overcommit — games allocate large virtual address spaces.
vm.overcommit_memory=1
vm.overcommit_ratio=50

# Keep more inode/dentry cache in memory (game assets, APK files).
vm.vfs_cache_pressure=50

# ── CPU ──────────────────────────────────────────────────────────────────────

# Disable real-time throttling — prevent scheduler from throttling RT tasks.
# Games use RT threads for audio and input.
kernel.sched_rt_runtime_us=-1

# Increase scheduler migration cost — keep game threads on their current CPU.
# Reduces cache miss from unnecessary migration.
kernel.sched_migration_cost_ns=5000000

# Disable auto-grouping — Android manages cgroups itself, auto-grouping conflicts.
kernel.sched_autogroup_enabled=0

# ── Network ──────────────────────────────────────────────────────────────────

# TCP BBR requires larger buffers to work correctly.
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.ipv4.tcp_rmem=4096 87380 16777216
net.ipv4.tcp_wmem=4096 65536 16777216

# Enable TCP fast open — reduces round trips for game reconnections.
net.ipv4.tcp_fastopen=3

# Reduce TIME_WAIT sockets — games open many short-lived connections.
net.ipv4.tcp_tw_reuse=1
net.ipv4.tcp_fin_timeout=15

# ── I/O ──────────────────────────────────────────────────────────────────────

# Read-ahead tuning for virtio-blk (128KB — good balance for game asset streaming).
# Applied per-device in udev rules, not sysctl. See image/init.gaming.rc.
